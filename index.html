<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check!</title>
    
    <!-- PWA Manifest e Cores -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="apple-touch-icon" href="assets/Icon180.png">
    <link rel="icon" type="image/png" href="assets/Favicon.png">
    
    <!-- Fonte: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (via CDN para simplicidade) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden font-sans select-none">

    <!-- CAMADA 1: O Fundo (Google Apps Script) -->
    <!-- Ele já começa a carregar desde o milissegundo zero, escondido atrás do splash screen -->
    <iframe 
        id="gas-frame"
        src="https://script.google.com/macros/s/AKfycbwuXY3TSm_evKn3jJnblg-u9igohVkqIpd7JmHWr5N57BIef3PNlKbpoUaOLo0zX-rWsw/exec" 
        class="absolute inset-0 w-full h-full border-none z-0"
        allow="camera; geolocation"
    ></iframe>

    <!-- CAMADA 2: A Cortina de Abertura (Splash Screen) -->
    <div id="splash-screen" class="absolute inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        
        <!-- Contêiner Central de Animação -->
        <div class="relative w-32 h-32 flex items-center justify-center">
            
            <!-- O Ícone de Check Oficial (Escondido inicialmente com scale-0) -->
            <div id="main-check" class="absolute inset-0 m-auto w-20 h-20 bg-slate-800 rounded-2xl shadow-lg shadow-slate-400/50 flex items-center justify-center scale-0 opacity-0 z-20">
                <i data-lucide="check-square" class="text-white w-10 h-10"></i>
            </div>

            <!-- A Grade dos 4 Ícones Iniciais -->
            <div id="icon-grid" class="absolute inset-0 m-auto w-16 h-16 grid grid-cols-2 grid-rows-2 gap-2 z-10 transition-opacity duration-300">
                <!-- Top-Left: Aparelhos -->
                <div class="anim-icon bg-blue-600 rounded-[10px] shadow-md shadow-blue-500/40 flex items-center justify-center text-white" data-position="tl">
                    <i data-lucide="smartphone" class="w-5 h-5"></i>
                </div>
                <!-- Top-Right: Lavagem -->
                <div class="anim-icon bg-emerald-600 rounded-[10px] shadow-md shadow-emerald-500/40 flex items-center justify-center text-white" data-position="tr">
                    <i data-lucide="droplets" class="w-5 h-5"></i>
                </div>
                <!-- Bottom-Left: Visão Geral -->
                <div class="anim-icon bg-amber-500 rounded-[10px] shadow-md shadow-amber-500/40 flex items-center justify-center text-white" data-position="bl">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                </div>
                <!-- Bottom-Right: Relatórios -->
                <div class="anim-icon bg-red-600 rounded-[10px] shadow-md shadow-red-500/40 flex items-center justify-center text-white" data-position="br">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                </div>
            </div>
        </div>

        <!-- Mensagem de Boas Vindas -->
        <div id="welcome-message" class="absolute top-[60%] flex flex-col items-center opacity-0 translate-y-4 transition-all duration-700 ease-out">
            <h1 class="text-xl font-semibold text-slate-500 mb-1">Bem-vindo ao</h1>
            <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">Check!</h2>
        </div>

        <!-- Assinatura no Rodapé -->
        <div id="signature" class="absolute bottom-8 opacity-0 transition-opacity duration-1000 text-sm text-slate-500">
            Powered with <span style="color: #e80523;" class="inline-block animate-pulse">&#10084;</span> by <strong class="text-slate-800">Mesaque</strong>
        </div>

    </div>

    <!-- CAMADA 3: O Maestro -->
    <script src="app.js"></script>
</body>
</html>
